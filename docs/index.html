<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Josh Hoffman</title>
  <meta name="description" content="Music, shows, and updates from Josh Hoffman.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* --- NAV --- */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1a1a;
      padding: 0.8rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    nav { justify-content: flex-end; }
    .wallet-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: #fff; color: #000; font-weight: 600; font-size: 0.85rem;
      padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none;
      transition: opacity 0.2s;
    }
    .wallet-btn:hover { opacity: 0.85; }
    .wallet-btn svg { width: 18px; height: 18px; }


    /* --- CONTAINER --- */
    .container { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* --- POSTS --- */
    .post {
      background: #131313; border: 1px solid #1e1e1e; border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    .post:hover { border-color: #2a2a2a; }
    .post-title {
      font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 0.4rem;
      cursor: pointer;
    }
    .post-date { font-size: 0.75rem; color: #444; margin-bottom: 0.75rem; }
    .post-body { font-size: 0.95rem; color: #bbb; line-height: 1.6; }
    .post-body a { color: #88b4e7; }

    /* Media embeds */
    .post iframe { margin-top: 0.75rem; border-radius: 8px; }
    .post img.post-image {
      width: 100%; border-radius: 8px; margin-top: 0.75rem;
    }
    .post video.post-video {
      width: 100%; border-radius: 8px; margin-top: 0.75rem;
    }
    .collage { display: grid; gap: 4px; margin-top: 0.75rem; border-radius: 8px; overflow: hidden;
      grid-template-columns: 1fr 1fr; }
    .collage.c1 { grid-template-columns: 1fr; }
    .collage.c3 :first-child { grid-row: span 2; }
    .collage img, .collage video { width: 100%; height: 100%; object-fit: cover; cursor: pointer;
      display: block; min-height: 120px; max-height: 400px; }
    .collage img:hover, .collage video:hover { opacity: 0.9; }
    .video-wrap {
      position: relative; padding-bottom: 56.25%; height: 0; margin-top: 0.75rem;
    }
    .video-wrap iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 8px; border: 0;
    }


    /* --- COMMENTS --- */
    .comments-section { margin-top: 1rem; border-top: 1px solid #1a1a1a; padding-top: 1rem; }
    .comments-toggle {
      font-size: 0.8rem; color: #555; cursor: pointer; background: none;
      border: none; font-family: inherit; padding: 0.4rem 0; display: block;
    }
    .comments-toggle:hover { color: #888; }
    .comments-list { margin-top: 0.75rem; }
    .comment {
      padding: 0.6rem 0; border-bottom: 1px solid #151515;
    }
    .comment:last-child { border-bottom: none; }
    .comment-author { font-size: 0.8rem; font-weight: 600; color: #ccc; }
    .comment-date { font-size: 0.7rem; color: #444; margin-left: 0.5rem; }
    .comment-body { font-size: 0.85rem; color: #999; margin-top: 0.2rem; line-height: 1.4; }
    .comment-actions { display: flex; gap: 0.75rem; margin-top: 0.3rem; }
    .comment-actions button {
      background: none; border: none; color: #555; font-size: 0.75rem;
      cursor: pointer; font-family: inherit; padding: 0;
    }
    .comment-actions button:hover { color: #aaa; }
    .comment-actions .liked { color: #e74c3c; }
    .replies { margin-left: 1.2rem; border-left: 1px solid #1e1e1e; padding-left: 0.8rem; }
    .comment-form { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .comment-form input, .comment-form textarea {
      width: 100%; padding: 0.55rem; border-radius: 6px; border: 1px solid #2a2a2a;
      background: #1a1a1a; color: #ddd; font-size: 0.85rem; font-family: inherit;
    }
    .comment-form textarea { resize: vertical; min-height: 50px; }
    .comment-form button {
      align-self: flex-end; padding: 0.45rem 1rem; border-radius: 6px;
      border: none; background: #333; color: #ddd; font-size: 0.8rem;
      font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .comment-form button:hover { background: #444; }
    .comment-error { color: #e74c3c; font-size: 0.8rem; margin-top: 0.3rem; }


    .empty { text-align: center; color: #444; padding: 3rem; font-size: 0.95rem; }

    /* --- LIGHTBOX --- */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
      flex-direction: column; padding: 1rem; cursor: pointer;
    }
    .lightbox.open { display: flex; }
    .lightbox img, .lightbox video {
      max-width: 95vw; max-height: 85vh; border-radius: 8px; object-fit: contain;
    }
    .lightbox-close {
      position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem;
      color: #fff; background: none; border: none; cursor: pointer; z-index: 10000;
    }

    /* --- EXPANDED POST --- */
    .post.expanded {
      position: fixed; inset: 1rem; z-index: 500; max-width: 800px;
      margin: auto; overflow-y: auto; padding: 2rem;
      border-color: #333; animation: expandIn 0.2s ease;
    }
    .post.expanded .collage img, .post.expanded .collage video {
      max-height: 600px;
    }
    .post-overlay {
      display: none; position: fixed; inset: 0; z-index: 499;
      background: rgba(0,0,0,0.7);
    }
    .post-overlay.open { display: block; }
    @keyframes expandIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  </style>
</head>
<body>

  <nav>
    <a href="https://josh-card-production.up.railway.app/join" class="wallet-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Add the Josh Card
    </a>
  </nav>

  <div class="container">
    <div id="feed"></div>
  </div>
  <div class="post-overlay" id="postOverlay" onclick="collapsePost()"></div>
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">&times;</button>
    <div id="lightbox-content"></div>
  </div>


  <script>
    const API_BASE = "https://josh-card-production.up.railway.app";
    let likedComments = JSON.parse(localStorage.getItem("liked") || "[]");

    function escHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function formatDate(d) {
      if (!d) return "";
      const dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    }

    function isVideo(url) {
      return /\.(mp4|mov|webm)/i.test(url) || /\/video\/upload\//i.test(url);
    }

    function renderMedia(post) {
      if (!post.mediaUrl) return "";

      // Check if it's a JSON array of URLs (collage)
      let urls;
      try { urls = JSON.parse(post.mediaUrl); } catch(e) { urls = null; }

      if (Array.isArray(urls) && urls.length > 1) {
        const count = urls.length;
        const cls = count <= 3 ? `c${count}` : "";
        const imgs = urls.map(u => {
          if (isVideo(u)) return `<video src="${escHtml(u)}" controls playsinline preload="metadata" onclick="event.stopPropagation()"></video>`;
          return `<img src="${escHtml(u)}" alt="" onclick="openLightbox('${escHtml(u)}', 'image'); event.stopPropagation();">`;
        }).join("");
        return `<div class="collage ${cls}">${imgs}</div>`;
      }

      if (post.type === "music") {
        if (post.mediaUrl.includes("spotify.com")) {
          const embed = post.mediaUrl.replace("open.spotify.com/", "open.spotify.com/embed/").split("?")[0];
          return `<iframe src="${escHtml(embed)}" width="100%" height="152" frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy" style="border-radius:8px; margin-top:0.75rem;"></iframe>`;
        }
        return `<a href="${escHtml(post.mediaUrl)}" target="_blank" style="color:#88b4e7;">Listen</a>`;
      }
      if (post.type === "image") {
        return `<img src="${escHtml(post.mediaUrl)}" alt="${escHtml(post.title)}" class="post-image">`;
      }
      if (post.type === "video") {
        let src = post.mediaUrl;
        if (isVideo(src)) {
          return `<video src="${escHtml(src)}" class="post-video" controls playsinline preload="metadata"></video>`;
        }
        const yt = src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?]+)/);
        if (yt) src = "https://www.youtube.com/embed/" + yt[1];
        return `<div class="video-wrap"><iframe src="${escHtml(src)}" allowfullscreen></iframe></div>`;
      }
      return "";
    }

    function renderComments(slug) {
      return `<div class="comments-section" onclick="event.stopPropagation()">
        <div id="comments-${slug}">
          <div class="comments-list" id="clist-${slug}"></div>
          <div class="comment-form" id="cform-${slug}">
            <input type="text" id="cname-${slug}" placeholder="Your name" maxlength="50">
            <textarea id="cbody-${slug}" placeholder="Leave a comment..." maxlength="2000"></textarea>
            <button onclick="postComment('${slug}')">Post</button>
            <div class="comment-error" id="cerr-${slug}"></div>
          </div>
        </div>
      </div>`;
    }


    const INITIAL_COMMENTS = 3;

    function renderCommentTree(comments, slug, showAll) {
      const topLevel = comments.filter(c => !c.parent_id);
      const replies = comments.filter(c => c.parent_id);

      // Sort top-level by most liked first, then newest
      topLevel.sort((a, b) => (b.likes || 0) - (a.likes || 0) || new Date(b.created_at) - new Date(a.created_at));

      function getReplies(parentId) {
        return replies.filter(c => c.parent_id === parentId);
      }

      function renderOne(c, depth) {
        const isLiked = likedComments.includes(c.id);
        const replyBtn = depth < 2 ? `<button onclick="showReplyForm(${c.id}, '${slug}')">Reply</button>` : "";
        const childReplies = getReplies(c.id);
        return `<div class="comment" id="comment-${c.id}">
          <span class="comment-author">${escHtml(c.author_name)}</span>
          <span class="comment-date">${c.created_at?.slice(0, 10) || ""}</span>
          <div class="comment-body">${escHtml(c.body)}</div>
          <div class="comment-actions">
            <button class="${isLiked ? 'liked' : ''}" onclick="likeComment(${c.id}, '${slug}')">
              ${isLiked ? '&#9829;' : '&#9825;'} ${c.likes || 0}
            </button>
            ${replyBtn}
          </div>
          <div id="reply-form-${c.id}"></div>
          ${childReplies.length ? `<div class="replies">${childReplies.map(r => renderOne(r, depth + 1)).join("")}</div>` : ""}
        </div>`;
      }

      const visible = showAll ? topLevel : topLevel.slice(0, INITIAL_COMMENTS);
      const html = visible.map(c => renderOne(c, 0)).join("");
      const remaining = topLevel.length - INITIAL_COMMENTS;

      if (!showAll && remaining > 0) {
        return html + `<button class="comments-toggle" onclick="expandComments('${slug}')">View ${remaining} more comment${remaining > 1 ? 's' : ''}</button>`;
      }
      return html;
    }

    const commentsCache = {};

    async function loadComments(slug, showAll) {
      const list = document.getElementById("clist-" + slug);
      try {
        const res = await fetch(API_BASE + "/api/comments/" + slug);
        const comments = await res.json();
        commentsCache[slug] = comments;
        if (!comments.length) {
          list.innerHTML = '<p style="font-size:0.8rem; color:#444; padding:0.5rem 0;">No comments yet.</p>';
          return;
        }
        list.innerHTML = renderCommentTree(comments, slug, !!showAll);
      } catch(e) {
        list.innerHTML = '<p style="color:#555; font-size:0.8rem;">Could not load comments.</p>';
      }
    }

    function expandComments(slug) {
      const list = document.getElementById("clist-" + slug);
      const comments = commentsCache[slug] || [];
      list.innerHTML = renderCommentTree(comments, slug, true);
    }

    function showReplyForm(parentId, slug) {
      const container = document.getElementById("reply-form-" + parentId);
      if (container.innerHTML) { container.innerHTML = ""; return; }
      container.innerHTML = `<div class="comment-form" style="margin-top:0.5rem;">
        <input type="text" id="rname-${parentId}" placeholder="Your name" maxlength="50">
        <textarea id="rbody-${parentId}" placeholder="Reply..." maxlength="2000"></textarea>
        <button onclick="postComment('${slug}', ${parentId})">Reply</button>
        <div class="comment-error" id="rerr-${parentId}"></div>
      </div>`;
    }

    async function likeComment(id, slug) {
      if (likedComments.includes(id)) return;
      try {
        await fetch(API_BASE + "/api/comments/" + id + "/like", { method: "POST" });
        likedComments.push(id);
        localStorage.setItem("liked", JSON.stringify(likedComments));
        await loadComments(slug);
      } catch(e) {}
    }

    async function postComment(slug, parentId) {
      let name, body, errEl;
      if (parentId) {
        name = document.getElementById("rname-" + parentId).value.trim();
        body = document.getElementById("rbody-" + parentId).value.trim();
        errEl = document.getElementById("rerr-" + parentId);
      } else {
        name = document.getElementById("cname-" + slug).value.trim();
        body = document.getElementById("cbody-" + slug).value.trim();
        errEl = document.getElementById("cerr-" + slug);
      }
      if (!name || !body) return;
      errEl.textContent = "";
      try {
        const res = await fetch(API_BASE + "/api/comments/" + slug, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, body, parentId: parentId || undefined }),
        });
        if (!res.ok) {
          const err = await res.json();
          errEl.textContent = err.error || "Error posting comment";
          return;
        }
        if (parentId) {
          document.getElementById("reply-form-" + parentId).innerHTML = "";
        } else {
          document.getElementById("cbody-" + slug).value = "";
        }
        await loadComments(slug);
      } catch(e) {
        errEl.textContent = "Failed to post comment";
      }
    }

    // Load and render posts from Railway API
    fetch(API_BASE + "/api/posts")
      .then(r => r.json())
      .then(posts => {
        const feed = document.getElementById("feed");
        if (!posts.length) {
          feed.innerHTML = '<div class="empty">Nothing here yet.</div>';
          return;
        }
        feed.innerHTML = posts.map(p => `<div class="post" onclick="expandPost(this)">
          ${p.title ? `<div class="post-title">${escHtml(p.title)}</div>` : ""}
          <div class="post-date">${formatDate(p.date)}</div>
          ${p.body ? `<div class="post-body">${escHtml(p.body).replace(/\n/g, "<br>")}</div>` : ""}
          ${renderMedia(p)}
          ${renderComments(p.slug)}
        </div>`).join("");
        // Auto-load comments for all posts
        posts.forEach(p => loadComments(p.slug));
      });

    // --- Expand post on click ---
    let expandedPost = null;
    function expandPost(el) {
      if (expandedPost === el) return;
      collapsePost();
      el.classList.add("expanded");
      document.getElementById("postOverlay").classList.add("open");
      expandedPost = el;
    }
    function collapsePost() {
      if (expandedPost) {
        expandedPost.classList.remove("expanded");
        expandedPost = null;
      }
      document.getElementById("postOverlay").classList.remove("open");
    }
    document.addEventListener("keydown", e => { if (e.key === "Escape") { collapsePost(); closeLightbox(); } });

    // --- Lightbox for images ---
    function openLightbox(src, type) {
      const lb = document.getElementById("lightbox");
      const content = document.getElementById("lightbox-content");
      if (type === "image") {
        content.innerHTML = `<img src="${src}" alt="">`;
      } else {
        content.innerHTML = `<video src="${src}" controls autoplay style="max-width:95vw;max-height:85vh;border-radius:8px;"></video>`;
      }
      lb.classList.add("open");
    }
    function closeLightbox() {
      const lb = document.getElementById("lightbox");
      lb.classList.remove("open");
      document.getElementById("lightbox-content").innerHTML = "";
    }
  </script>
</body>
</html>
